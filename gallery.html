<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery - USMV MC</title>
  <meta name="description" content="Explore pictures from the rides, meetings, and events of the U.S. Military Veterans Motorcycle Club (USMV MC).">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header Section -->
  <header id="main-header"></header>

  <!-- Gallery Content -->
  <section class="section">
    <div class="gallery-intro">
      <h2>Club Photo Gallery</h2>
      <p>
        Images from our runs, charity events, and times together. Members can add new folders and upload photos by dragging and dropping them into directories under the <code>gallery/</code> folder, then double-clicking <code>update_gallery.bat</code> to automatically update the website.
      </p>
    </div>

    <!-- Dynamic Gallery Sections Container (populated by main.js and gallery-data.js) -->
    <div id="gallery-sections">
      <!-- Dynamic list of folders and image grids will render here -->
    </div>
  </section>

  <!-- Lightbox UI Component -->
  <div id="lightbox" class="lightbox">
    <button id="lightbox-close" class="lightbox-close" aria-label="Close Lightbox">&times;</button>
    <button id="lightbox-prev" class="lightbox-prev lightbox-nav" aria-label="Previous Photo">&#10094;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" class="lightbox-img" src="" alt="Lightbox View">
      <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>
    <button id="lightbox-next" class="lightbox-next lightbox-nav" aria-label="Next Photo">&#10095;</button>
  </div>

  <!-- Footer Section -->
  <footer id="main-footer"></footer>

  <!-- Load galleryData generated by update_gallery.ps1, then load global logic -->
  <script src="js/gallery-data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
